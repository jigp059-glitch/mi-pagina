<!DOCTYPE html>
<html>
<head>
  <title>Portafolio Jose</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      background: #000;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    section {
      padding: 40px;
      text-align: center;
    }

    .proyectos {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #222;
      padding: 20px;
      width: 200px;
      border-radius: 10px;
    }

    button {
      background: #00bcd4;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
  </style>

</head>
<body>

<header>
  <h1>Jose Gonzalez</h1>
  <nav>
    <a href="#inicio">Inicio</a>
    <a href="#sobre">Sobre mí</a>
    <a href="#proyectos">Proyectos</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<section id="inicio">
  <h2>Bienvenido</h2>
  <p>Estoy aprendiendo desarrollo Front-End 🚀</p>
</section>

<section id="sobre">
  <h2>Sobre mí</h2>
  <p>Soy principiante en programación, aprendiendo HTML, CSS y JavaScript.</p>
</section>

<section id="proyectos">
  <h2>Mis proyectos</h2>

  <div class="proyectos">
    <div class="card">
      <h3>Proyecto 1</h3>
      <p>Mi primera página web</p>
    </div>

    <div class="card">
      <h3>Proyecto 2</h3>
      <p>Página con botón interactivo</p>
    </div>
  </div>

</section>

<section id="contacto">
  <h2>Contacto</h2>
  <button onclick="contacto()">Escríbeme</button>
</section>

<script>
  function contacto() {
    alert("Puedes contactarme pronto 🚀");
  }
</script>

</body>
</html>
